            <img src="./logo.svg" alt="EverydayHub" class="logo-img logo-dark" width="165" height="36" decoding="async" />
<img src="./logo-light.svg" alt="" class="logo-img logo-light" width="165" height="36" decoding="async" aria-hidden="true" />

            <button type="button" class="theme-toggle-btn" id="theme-toggle" aria-label="Switch to dark mode">

      <main class="page-main">
        <article id="content" class="readme-body">

    <script src="./theme.js"></script>
    <script type="importmap">
      {
        "imports": {
          "marked": "https://cdn.jsdelivr.net/npm/marked@15.0.7/lib/marked.esm.js"
        },
        "integrity": {
          "https://cdn.jsdelivr.net/npm/marked@15.0.7/lib/marked.esm.js": "sha384-NpOwQJGB5x/x3LzpCM0reBj1wPu7ywvPZAm0T+dZA4G0cFx9ZQlFiDt8BcEOz0Xy"
        }
      }
    </script>
    <script type="module">
      import { marked } from 'marked';
      import { initScrollReveal, initHeaderScroll } from './scroll-reveal.js';

      marked.setOptions({ gfm: true, breaks: false });

      initHeaderScroll(document);

      document.getElementById('year').textContent = String(new Date().getFullYear());

      const toggle = document.querySelector('.nav-toggle');
      const navList = document.getElementById('nav-list');
      if (toggle && navList) {
        toggle.addEventListener('click', () => {
          const open = navList.classList.toggle('open');
          toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
        navList.querySelectorAll('a').forEach((link) => {
          link.addEventListener('click', () => {
            navList.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
          });
        });
      }

      const el = document.getElementById('content');
      const assetBase = new URL('./screenshots/', window.location.href).href;
      try {
        const res = await fetch('README.md');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        let md = await res.text();
        md = md.replace(/\]\(\.\/screenshots\//g, `](${assetBase}`);
        el.innerHTML = marked.parse(md);
        initScrollReveal(document);
      } catch (e) {
        el.innerHTML = `<p class="err">Could not load README.md (${e.message}). <a href="https://github.com/krishnasfdcc-a11y/EveryDayHub.App/blob/main/README.md">View on GitHub</a>.</p>`;
      }
    </script>
  </body>
</html>
