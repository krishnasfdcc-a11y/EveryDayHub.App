<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="EverydayHub — privacy-first digital utilities. Architecture, features, and privacy commitments."
    />
    <meta name="theme-color" content="#0f172a" />
    <title>EverydayHub — About, Architecture & Privacy</title>
    <link rel="icon" href="https://everydayhub.app/favicon.svg" type="image/svg+xml" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-body/5.2.0/github-markdown-dark.min.css"
      integrity="sha512-9N2L6N8/2wtz0f6bN8N8N8N8N8N8N8N8N8N8N8N8N8N8N8N8N8N8N8N8N8N8="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
      onerror="this.remove()"
    />
    <style>
      :root {
        color-scheme: dark;
        --page-bg: #0b1121;
        --page-fg: #e2e8f0;
        --accent: #6366f1;
        --accent-2: #06b6d4;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background:
          radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99, 102, 241, 0.18), transparent),
          radial-gradient(ellipse 60% 40% at 100% 0%, rgba(6, 182, 212, 0.1), transparent),
          var(--page-bg);
        color: var(--page-fg);
      }
      .top-bar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.75rem 1.25rem;
        background: rgba(11, 17, 33, 0.88);
        border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        backdrop-filter: blur(12px);
      }
      .top-bar a.brand {
        font-weight: 700;
        font-size: 0.95rem;
        color: #f8fafc;
        text-decoration: none;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .top-bar nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 1rem;
        font-size: 0.82rem;
      }
      .top-bar nav a {
        color: #94a3b8;
        text-decoration: none;
      }
      .top-bar nav a:hover {
        color: #67e8f9;
      }
      .shell {
        max-width: 980px;
        margin: 0 auto;
        padding: 2rem 1.25rem 4rem;
      }
      #content {
        line-height: 1.65;
      }
      #content h1,
      #content h2,
      #content h3 {
        border-bottom: 1px solid rgba(148, 163, 184, 0.15);
        padding-bottom: 0.35em;
      }
      #content img {
        max-width: 100%;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        margin: 1rem 0;
      }
      #content table {
        display: block;
        overflow-x: auto;
        border-collapse: collapse;
        width: 100%;
        font-size: 0.9rem;
      }
      #content th,
      #content td {
        border: 1px solid rgba(148, 163, 184, 0.2);
        padding: 0.5rem 0.75rem;
      }
      #content th {
        background: rgba(99, 102, 241, 0.12);
      }
      #content blockquote {
        border-left: 4px solid var(--accent);
        margin: 1.25rem 0;
        padding: 0.5rem 1rem;
        color: #cbd5e1;
        background: rgba(99, 102, 241, 0.08);
        border-radius: 0 8px 8px 0;
      }
      #content a {
        color: #67e8f9;
      }
      #content code {
        background: rgba(15, 23, 42, 0.8);
        padding: 0.15em 0.4em;
        border-radius: 4px;
        font-size: 0.88em;
      }
      #content pre {
        overflow-x: auto;
        background: #0f172a;
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 8px;
        padding: 1rem;
      }
      .loading {
        text-align: center;
        padding: 4rem 1rem;
        color: #64748b;
      }
      .err {
        color: #fca5a5;
        padding: 2rem;
        text-align: center;
      }
      @media (max-width: 640px) {
        .top-bar nav {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="top-bar">
      <a class="brand" href="https://everydayhub.app/">EverydayHub</a>
      <nav aria-label="Quick links">
        <a href="https://everydayhub.app/">App</a>
        <a href="https://tools.everydayhub.app/">Tools</a>
        <a href="https://everydayhub.app/DataForge/">DataForge</a>
        <a href="https://github.com/krishnasfdcc-a11y/EveryDayHub.App">GitHub</a>
      </nav>
    </header>
    <main class="shell">
      <article id="content" class="markdown-body">
        <p class="loading">Loading documentation…</p>
      </article>
    </main>
    <script type="module">
      import { marked } from 'https://cdn.jsdelivr.net/npm/marked@15.0.7/lib/marked.esm.js';

      marked.setOptions({ gfm: true, breaks: false });

      const el = document.getElementById('content');

      try {
        const res = await fetch('README.md');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();
        el.innerHTML = marked.parse(md);
        document.title = 'EverydayHub — About, Architecture & Privacy';
      } catch (e) {
        el.innerHTML = `<p class="err">Could not load README.md (${e.message}). <a href="https://github.com/krishnasfdcc-a11y/EveryDayHub.App/blob/main/README.md">View on GitHub</a>.</p>`;
      }
    </script>
  </body>
</html>
